# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  postgres:
    image: postgres:16-alpine
    container_name: lora-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loracoffee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-loracoffee}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-loracoffee}
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lora-internal

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: lora-api-prod
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-loracoffee};Username=${POSTGRES_USER:-loracoffee};Password=${POSTGRES_PASSWORD}
      - Jwt__Key=${JWT_KEY:?JWT_KEY is required}
      - Jwt__Issuer=${JWT_ISSUER:-LoraCoffee.API}
      - Jwt__Audience=${JWT_AUDIENCE:-LoraCoffee.Client}
      - CORS__Origins=${CORS_ORIGINS:?CORS_ORIGINS is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lora-internal

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        NGINX_CONF: nginx.prod.conf
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_HUB_URL: ${VITE_HUB_URL:-}
    container_name: lora-frontend-prod
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - lora-internal

volumes:
  postgres_data:

networks:
  lora-internal:
    driver: bridge
