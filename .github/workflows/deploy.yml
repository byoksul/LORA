name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:   # GitHub'dan elle de tetiklenebilir

concurrency:
  group: deploy-vps
  cancel-in-progress: false   # deploy'lar ust uste binmesin

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: VPS'e SSH ile deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: /opt/lora/deploy.sh
