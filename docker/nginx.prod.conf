# Production Nginx — SSL/HTTPS reverse proxy
# Sertifikalar: docker/ssl/fullchain.pem ve docker/ssl/privkey.pem
# Self-signed test: openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#   -keyout docker/ssl/privkey.pem -out docker/ssl/fullchain.pem \
#   -subj "/CN=localhost"

upstream lora_api {
    server api:8080;
}

server {
    listen 80;
    server_name _;

    # HTTP → HTTPS yönlendirme (sertifika varsa)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Güvenlik başlıkları
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://lora_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /hubs {
        proxy_pass http://lora_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://lora_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
